<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ingreso MNHNCL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --mnhn-teal: #004d40; --mnhn-red: #c62828; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .wrapper { max-width: 1000px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Cabecera */
        .header-ui { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--mnhn-teal); padding-bottom: 20px; margin-bottom: 30px; }
        .header-ui img { display: block; }
        .title-area { text-align: center; flex: 1; }
        .title-area h1 { margin: 0; font-size: 1.5rem; color: var(--mnhn-teal); }
        
        /* Formulario */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #666; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
        input:focus { border-color: var(--mnhn-teal); outline: none; box-shadow: 0 0 0 2px rgba(0,77,64,0.1); }

        /* Botones */
        .btn { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-add { background: var(--mnhn-teal); color: white; width: 100%; margin-top: 10px; }
        .btn-add:hover { background: #00332a; }
        .btn-pdf { background: var(--mnhn-red); color: white; padding: 18px 40px; font-size: 1.1rem; }
        .btn-pdf:hover { background: #a82323; transform: translateY(-2px); }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 0.85rem; }
        th { background: #f8f9fa; border-bottom: 2px solid #dee2e6; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px; }
        .actions { display: flex; gap: 8px; }
        .edit-row { background: #ff9800; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; border: none; cursor: pointer; }
        .del-row { background: #f44336; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-ui">
        <img id="logoL" width="120" src="https://raw.githubusercontent.com/MNHN-Zoologia-Invertebrados/assets/main/LOGO_SERPAT.png" alt="SERPAT">
        <div class="title-area">
            <h1>INGRESO DE ESPECÍMENES</h1>
            <small>Área de Zoología de Invertebrados</small>
        </div>
        <img id="logoR" width="138" src="https://raw.githubusercontent.com/MNHN-Zoologia-Invertebrados/assets/main/LOGO_MNHN.png" alt="MNHN">
    </div>

    <div style="background: #fdfdfd; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
        <label>DATOS DEL PROYECTO / LEGATARIO</label>
        <div class="grid">
            <div class="field"><label>Legatario</label><input type="text" id="legatario" placeholder="Nombre completo"></div>
            <div class="field"><label>Email</label><input type="email" id="email"></div>
            <div class="field"><label>Institución</label><input type="text" id="afiliacion"></div>
            <div class="field"><label>Fecha</label><input type="date" id="fecha_actual"></div>
        </div>
        
        <label>DETALLE TAXONÓMICO</label>
        <div class="grid">
            <div class="field"><label>Especie</label><input type="text" id="especie" placeholder="Género especie"></div>
            <div class="field"><label>Tipificación</label><input type="text" id="tipificacion" placeholder="Ej: Paratipo"></div>
            <div class="field"><label>Localidad</label><input type="text" id="localidad"></div>
            <div class="field"><label>Cantidad</label><input type="number" id="n_ind" value="1"></div>
            <div class="field" style="justify-content: flex-end;">
                <button class="btn btn-add" onclick="addItem()">AÑADIR A LISTA</button>
            </div>
        </div>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>Especie</th>
                <th>Tipificación</th>
                <th>Localidad</th>
                <th>Cant.</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div style="text-align: center; margin-top: 40px;">
        <button class="btn btn-pdf" onclick="generatePDF()">DESCARGAR FORMULARIO OFICIAL (PDF)</button>
    </div>
</div>

<script>
    let db = [];
    const urlSerpat = "https://raw.githubusercontent.com/MNHN-Zoologia-Invertebrados/assets/main/LOGO_SERPAT.png";
    const urlMnhn = "https://raw.githubusercontent.com/MNHN-Zoologia-Invertebrados/assets/main/LOGO_MNHN.png";

    // Función para convertir URL a Base64 real (bypass CORS)
    async function toBase64(url) {
        const response = await fetch(url);
        const blob = await response.blob();
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    }

    function addItem() {
        const item = {
            especie: document.getElementById('especie').value,
            tipificacion: document.getElementById('tipificacion').value,
            localidad: document.getElementById('localidad').value,
            n: document.getElementById('n_ind').value,
            // Campos técnicos para el PDF
            legatario: document.getElementById('legatario').value,
            email: document.getElementById('email').value,
            fecha: document.getElementById('fecha_actual').value
        };
        if(!item.especie || !item.localidad) return alert("Complete los campos básicos.");
        db.push(item);
        updateUI();
        clearInputs();
    }

    function editItem(index) {
        const it = db[index];
        document.getElementById('especie').value = it.especie;
        document.getElementById('tipificacion').value = it.tipificacion;
        document.getElementById('localidad').value = it.localidad;
        document.getElementById('n_ind').value = it.n;
        db.splice(index, 1);
        updateUI();
    }

    function clearInputs() {
        ['especie', 'tipificacion', 'localidad'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('n_ind').value = 1;
    }

    function updateUI() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = db.map((it, i) => `
            <tr>
                <td><i>${it.especie}</i></td>
                <td>${it.tipificacion || '-'}</td>
                <td>${it.localidad}</td>
                <td>${it.n}</td>
                <td class="actions">
                    <button class="edit-row" onclick="editItem(${i})">Editar</button>
                    <button class="del-row" onclick="db.splice(${i},1);updateUI()">×</button>
                </td>
            </tr>
        `).join('');
    }

    async function generatePDF() {
        if(db.length === 0) return alert("Agregue material a la lista.");
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        
        try {
            // CARGA DE LOGOS SEGURA
            const b64Serpat = await toBase64(urlSerpat);
            const b64Mnhn = await toBase64(urlMnhn);

            // Logos con tamaños precisos (MNHN +15%)
            doc.addImage(b64Serpat, 'PNG', 15, 10, 35, 18);
            doc.addImage(b64Mnhn, 'PNG', 240, 8, 42, 25); 

            // Encabezado
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text("FORMULARIO DE INGRESO DE ESPECÍMENES", 148, 18, {align: 'center'});
            doc.setFontSize(10);
            doc.text("Área Zoología de Invertebrados - MNHNCL", 148, 24, {align: 'center'});

            // Datos Legatario
            doc.autoTable({
                startY: 35,
                theme: 'grid',
                styles: { fontSize: 8 },
                body: [
                    ['Legatario:', document.getElementById('legatario').value, 'Fecha:', document.getElementById('fecha_actual').value],
                    ['Email:', document.getElementById('email').value, 'Institución:', document.getElementById('afiliacion').value]
                ]
            });

            // Tabla de Datos
            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 5,
                head: [['N°', 'Especie', 'Tipificación', 'Localidad', 'Cant.', 'Catálogo (Uso Interno)']],
                body: db.map((it, i) => [i+1, it.especie, it.tipificacion, it.localidad, it.n, ""]),
                styles: { fontSize: 7 },
                headStyles: { fillColor: [240, 240, 240], textColor: 0, fontStyle: 'bold' },
                columnStyles: { 1: { fontStyle: 'italic' } }
            });

            // Pie de página y firmas
            const finalY = doc.lastAutoTable.finalY + 20;
            doc.setFontSize(8);
            doc.text("__________________________", 60, finalY);
            doc.text("Firma Legatario", 60, finalY + 5, {align: 'center'});
            
            doc.text("__________________________", 230, finalY);
            doc.text("Andrea Martínez Salinas", 230, finalY + 5, {align: 'center'});
            doc.setFontSize(7);
            doc.text("Jefa Área Zoología de Invertebrados", 230, finalY + 9, {align: 'center'});

            doc.save("Formulario_Ingreso_MNHN.pdf");

        } catch (err) {
            console.error(err);
            alert("Error de conexión con los servidores de imágenes. Verifique su internet.");
        }
    }
</script>
</body>
</html>
