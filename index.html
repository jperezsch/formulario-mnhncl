<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito MNHNCL - Proyecto Formulario 2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary-color: #004d40; --accent-color: #c62828; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: var(--bg-color); }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 20px; }
        .header img { height: 80px; width: auto; }
        .header-text { text-align: center; }
        .header-text h2 { margin: 0; font-size: 1.4em; color: #333; }
        
        .section-title { background: #eee; padding: 8px 12px; font-weight: bold; margin-top: 20px; border-radius: 4px; font-size: 0.9em; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; padding: 15px 0; }
        label { font-weight: bold; font-size: 0.8em; color: #555; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; box-sizing: border-box; }

        .btn-add { background: #2e7d32; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; }
        .main-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-pdf { background: #c62828; color: white; flex: 1; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-excel { background: #1b5e20; color: white; flex: 1; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #previewTable { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8em; }
        #previewTable th, #previewTable td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        #previewTable th { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/MNHN-Zoologia-Invertebrados/assets/main/logo_serpat.png" alt="SERPAT">
        <div class="header-text">
            <h2>Formulario de Ingreso de Especímenes</h2>
            <p>Área Zoología de Invertebrados</p>
        </div>
        <img src="https://raw.githubusercontent.com/MNHN-Zoologia-Invertebrados/assets/main/logo_mnhn.png" alt="MNHN">
    </div>

    <div class="section-title">DATOS DEL LEGATARIO Y PROYECTO</div>
    <div class="form-grid">
        <div><label>Legatario:</label><input type="text" id="legatario"></div>
        <div><label>Email:</label><input type="email" id="email"></div>
        <div><label>Fono:</label><input type="text" id="fono"></div>
        <div><label>Afiliación Institucional:</label><input type="text" id="afiliacion"></div>
        <div><label>Proyecto/Publicación:</label><input type="text" id="proyecto"></div>
        <div><label>Expedición:</label><input type="text" id="expedicion"></div>
        <div style="grid-column: span 2;"><label>Protocolo de muestreo:</label><input type="text" id="protocolo"></div>
        <div><label>Fecha:</label><input type="date" id="fecha_actual"></div>
    </div>

    <div class="section-title">DETALLE TAXONÓMICO</div>
    <div class="form-grid">
        <div><label>Especie:</label><input type="text" id="especie"></div>
        <div><label>Tipificación:</label><input type="text" id="tipificacion" placeholder="Ej: Holotipo, Paratipo"></div>
        <div><label>Código Muestra:</label><input type="text" id="codigo_muestra"></div>
        <div><label>Determinador:</label><input type="text" id="determinador"></div>
        <div><label>Fecha Det.:</label><input type="date" id="fecha_det"></div>
        <div><label>N° Indiv.:</label><input type="number" id="n_individuos" value="1"></div>
        <div><label>Localidad:</label><input type="text" id="localidad"></div>
        <div><label>Coordenadas:</label><input type="text" id="coordenadas"></div>
        <div><label>Colector:</label><input type="text" id="colector"></div>
        <div><label>Fecha Rec.:</label><input type="date" id="fecha_recoleccion"></div>
        <div>
            <label>Conservación:</label>
            <select id="conservacion">
                <option value="Alcohol 70%">Alcohol 70%</option>
                <option value="Alcohol 95%">Alcohol 95%</option>
                <option value="Seco">Seco</option>
                <option value="Montaje">Montaje</option>
            </select>
        </div>
        <div><button class="btn-add" onclick="agregarItem()">+ Añadir a la Lista</button></div>
    </div>

    <table id="previewTable">
        <thead>
            <tr>
                <th>Especie</th>
                <th>Tipificación</th>
                <th>Cód.</th>
                <th>Localidad</th>
                <th>Cant.</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="listaCuerpo"></tbody>
    </table>

    <div class="main-actions">
        <button class="btn-excel" onclick="exportarExcel()">Descargar EXCEL</button>
        <button class="btn-pdf" onclick="exportarPDF()">Descargar PDF</button>
    </div>
</div>

<script>
    let items = [];

    function agregarItem() {
        const item = {
            especie: document.getElementById('especie').value,
            tipificacion: document.getElementById('tipificacion').value,
            codigo: document.getElementById('codigo_muestra').value,
            determinador: document.getElementById('determinador').value,
            fecha_det: document.getElementById('fecha_det').value,
            n: document.getElementById('n_individuos').value,
            localidad: document.getElementById('localidad').value,
            coords: document.getElementById('coordenadas').value,
            colector: document.getElementById('colector').value,
            fecha_rec: document.getElementById('fecha_recoleccion').value,
            modo: document.getElementById('conservacion').value
        };
        if(!item.especie) return alert("Ingrese al menos la especie.");
        items.push(item);
        renderTabla();
    }

    function renderTabla() {
        const tbody = document.getElementById('listaCuerpo');
        tbody.innerHTML = items.map((it, index) => `
            <tr>
                <td><i>${it.especie}</i></td>
                <td>${it.tipificacion}</td>
                <td>${it.codigo}</td>
                <td>${it.localidad}</td>
                <td>${it.n}</td>
                <td><button onclick="items.splice(${index},1);renderTabla()">X</button></td>
            </tr>
        `).join('');
    }

    // --- LÓGICA DE EXCEL ---
    function exportarExcel() {
        if(items.length === 0) return alert("Lista vacía.");
        
        const wsData = [
            ["FORMULARIO DE INGRESO DE ESPECÍMENES - ÁREA ZOOLOGÍA DE INVERTEBRADOS"],
            ["Legatario:", document.getElementById('legatario').value, "", "", "Fecha:", document.getElementById('fecha_actual').value],
            ["Email:", document.getElementById('email').value, "", "", "Fono:", document.getElementById('fono').value],
            ["Afiliación:", document.getElementById('afiliacion').value],
            ["Proyecto:", document.getElementById('proyecto').value, "", "", "Expedición:", document.getElementById('expedicion').value],
            ["Protocolo:", document.getElementById('protocolo').value],
            [],
            ["N°", "Especie", "Tipificación", "Código muestra", "Determinador", "Fecha det.", "N° ind.", "Localidad", "Coordenadas", "Colector", "Fecha rec.", "Modo", "N° Catálogo Asig."]
        ];

        items.forEach((it, idx) => {
            wsData.push([idx + 1, it.especie, it.tipificacion, it.codigo, it.determinador, it.fecha_det, it.n, it.localidad, it.coords, it.colector, it.fecha_rec, it.modo, ""]);
        });

        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = [{wch:5}, {wch:25}, {wch:15}, {wch:15}, {wch:15}, {wch:12}, {wch:8}, {wch:30}, {wch:15}, {wch:15}, {wch:12}, {wch:12}, {wch:15}];
        
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ingreso_MNHN");
        XLSX.writeFile(wb, "Formulario_MNHN.xlsx");
    }

    // --- LÓGICA DE PDF (Fiel a la imagen) ---
    async function exportarPDF() {
        if(items.length === 0) return alert("Lista vacía.");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const margin = 10;
        const pageWidth = 297;

        // Títulos
        doc.setFontSize(14); doc.setFont("helvetica", "bold");
        doc.text("Formulario de Ingreso de Especímenes", pageWidth/2, 15, {align: 'center'});
        doc.setFontSize(12);
        doc.text("Área Zoología de Invertebrados", pageWidth/2, 22, {align: 'center'});

        // Datos Legatario (Estructura de tabla simple)
        doc.autoTable({
            startY: 28,
            margin: {left: margin},
            tableWidth: pageWidth - (margin*2),
            theme: 'grid',
            styles: {fontSize: 8, cellPadding: 1},
            body: [
                ['Legatario:', document.getElementById('legatario').value, 'Fecha:', document.getElementById('fecha_actual').value],
                ['Email:', document.getElementById('email').value, 'Fono:', document.getElementById('fono').value],
                ['Afiliación:', {content: document.getElementById('afiliacion').value, colSpan: 3}],
                ['Proyecto:', document.getElementById('proyecto').value, 'Expedición:', document.getElementById('expedicion').value],
                ['Protocolo:', {content: document.getElementById('protocolo').value, colSpan: 3}]
            ],
            columnStyles: {0:{fillColor:[240,240,240], fontStyle:'bold', cellWidth:25}, 2:{fillColor:[240,240,240], fontStyle:'bold', cellWidth:25}}
        });

        // Tabla de Especímenes
        doc.autoTable({
            startY: doc.lastAutoTable.finalY + 5,
            margin: {left: margin},
            tableWidth: pageWidth - (margin*2),
            head: [['N°', 'Especie', 'Tipific.', 'Cód.', 'Determinador', 'Fecha Det', 'N°', 'Localidad', 'Coords', 'Colector', 'Fecha Rec', 'Modo', 'Catálogo']],
            body: items.map((it, idx) => [idx+1, it.especie, it.tipificacion, it.codigo, it.determinador, it.fecha_det, it.n, it.localidad, it.coords, it.colector, it.fecha_rec, it.modo, ""]),
            styles: {fontSize: 6.5, overflow: 'linebreak', cellPadding: 0.5},
            headStyles: {fillColor: [255, 255, 255], textColor: [0, 0, 0], lineWidth: 0.1, fontStyle: 'bold'},
            columnStyles: {1: {fontStyle: 'italic', cellWidth: 30}, 7: {cellWidth: 35}}
        });

        // Declaración Final
        const finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(8); doc.setFont("helvetica", "normal");
        const declaracion = `Quien suscribe, ${document.getElementById('legatario').value || '___________________'}, declara que el material antes individualizado ha sido donado al Área Zoología de Invertebrados del Museo Nacional de Historia Natural de Chile, para su depósito permanente en las colecciones biológicas allí resguardadas. Además, señala que no existe por parte del MNHNCL ninguna obligación de carácter monetario, ni de exhibición de los especímenes, solo el compromiso de resguardarlos adecuadamente.`;
        const splitText = doc.splitTextToSize(declaracion, pageWidth - 30);
        doc.text(splitText, 15, finalY);

        // Firmas
        const firmaY = finalY + 25;
        doc.line(40, firmaY, 110, firmaY);
        doc.text("Firma del Legatario", 75, firmaY + 5, {align: 'center'});

        doc.line(180, firmaY, 250, firmaY);
        doc.setFont("helvetica", "bold");
        doc.text("Andrea Martínez Salinas", 215, firmaY + 5, {align: 'center'});
        doc.setFont("helvetica", "normal");
        doc.text("Jefa Área Zoología de Invertebrados", 215, firmaY + 9, {align: 'center'});

        doc.save("Formulario_Ingreso_MNHN.pdf");
    }
</script>
</body>
</html>
